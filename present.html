<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TÆPPIN' — Stage Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(1000px 700px at 50% -15%, rgba(255,91,36,0.16), transparent 60%),
      radial-gradient(700px 500px at 10% 110%, rgba(255,91,36,0.06), transparent 60%),
      #0E0E10;
    color: #fff; font-family: 'Inter', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
  }
  .stage { display: flex; align-items: center; gap: 72px; transition: gap 0.6s ease; }

  .pitch { max-width: 380px; transition: opacity 0.45s ease, max-width 0.6s ease, margin 0.6s ease, transform 0.6s ease; }
  /* after the opener: pitch collapses away so the phone glides to centre */
  body.presenting .stage { gap: 0; }
  body.presenting .pitch { opacity: 0; max-width: 0; margin: 0; transform: translateX(-40px); overflow: hidden; pointer-events: none; }
  .pitch .logo {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 34px;
    color: #FF5B24; letter-spacing: 0.02em; margin-bottom: 18px;
  }
  .pitch h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 44px; line-height: 1.04; margin-bottom: 16px; }
  .pitch h1 .accent { color: #FF5B24; }
  .pitch p { color: #9CA3AF; font-size: 17px; line-height: 1.6; }
  .pitch .badge {
    display: inline-block; margin-top: 22px; font-size: 12px; letter-spacing: 0.14em;
    color: #9CA3AF; border: 1px solid rgba(255,255,255,0.14); padding: 8px 13px;
    border-radius: 999px; text-transform: uppercase;
  }

  /* phone mockup */
  .phone-wrap { transform-origin: center center; transition: transform 0.6s cubic-bezier(.2,.8,.2,1), margin 0.6s cubic-bezier(.2,.8,.2,1); perspective: 1500px; }
  /* "tap to pay" gesture: phone dips + tilts forward like bumping a terminal */
  .phone { transform-origin: center 80%; }
  .phone.tapping { animation: phoneTap 1.15s cubic-bezier(.3,.7,.3,1); }
  @keyframes phoneTap {
    0%   { transform: rotateX(0deg) translateY(0); }
    18%  { transform: rotateX(22deg) translateY(16px); }
    36%  { transform: rotateX(0deg) translateY(0); }
    54%  { transform: rotateX(17deg) translateY(12px); }
    72%, 100% { transform: rotateX(0deg) translateY(0); }
  }
  .phone {
    position: relative; width: 390px; height: 844px; border-radius: 56px;
    background: #08080a; padding: 14px;
    box-shadow:
      0 0 0 2px #1d1d22,
      0 50px 130px -30px rgba(0,0,0,0.9),
      0 0 90px -20px rgba(255,91,36,0.28);
  }
  .screen { position: relative; width: 100%; height: 100%; border-radius: 44px; overflow: hidden; background: #0E0E10; }
  .screen iframe { width: 100%; height: 100%; border: 0; display: block; }
  .notch {
    position: absolute; top: 13px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 33px; background: #000; border-radius: 18px; z-index: 5;
  }
  .side-btn { position: absolute; width: 3px; background: #1d1d22; border-radius: 3px; }
  .side-btn.power { right: -5px; top: 200px; height: 92px; }
  .side-btn.vol1 { left: -5px; top: 168px; height: 56px; }
  .side-btn.vol2 { left: -5px; top: 236px; height: 56px; }

  /* orange hexagonal shockwaves radiating from the tap contact point.
     sit behind the phone so the rings spread out against the background. */
  .shockwaves {
    position: absolute; left: 50%; top: 9%;
    width: 0; height: 0; z-index: -1; pointer-events: none;
  }
  .shock {
    position: absolute; left: 50%; top: 50%;
    width: 300px; height: 300px; margin: -150px 0 0 -150px;
    transform: scale(0.15); opacity: 0;
    animation: shockOut 1s ease-out forwards;
    filter: drop-shadow(0 0 12px rgba(255,91,36,0.55));
  }
  .shock svg { width: 100%; height: 100%; display: block; }
  .shock polygon { fill: none; stroke: #FF5B24; stroke-width: 2.5; }
  @keyframes shockOut {
    0%   { transform: scale(0.15); opacity: 0; }
    12%  { opacity: 0.9; }
    100% { transform: scale(2.6); opacity: 0; }
  }
  /* little orange plus signs that pop and drift out on each tap */
  .plus {
    position: absolute; left: 50%; top: 50%;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    color: #FF5B24; line-height: 1;
    text-shadow: 0 0 10px rgba(255,91,36,0.7);
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0; pointer-events: none;
    animation: plusPop 0.9s ease-out forwards;
  }
  @keyframes plusPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) translate(0,0) scale(0.3); }
    25%  { opacity: 1; }
    100% { opacity: 0; transform:
             translate(-50%, -50%)
             translate(var(--dx), var(--dy)) scale(1.1); }
  }

  /* hide the pitch copy on narrower screens so the phone stays centred */
  @media (max-width: 1180px) { .pitch { display: none; } .stage { gap: 0; } }
</style>
</head>
<body>
  <div class="stage">
    <div class="pitch">
      <div class="logo">TÆPPIN'</div>
      <h1>Turn every payment into a <span class="accent">power move.</span></h1>
      <p>A real-time territory game embedded in Vipps — tap to claim turf, grab loot boxes, and win the grand prize.</p>
      <div class="badge">Vipps Hackathon 2026</div>
    </div>

    <div class="phone-wrap" id="phoneWrap">
      <div class="shockwaves" id="shockwaves"></div>
      <div class="phone">
        <span class="side-btn vol1"></span>
        <span class="side-btn vol2"></span>
        <span class="side-btn power"></span>
        <div class="notch"></div>
        <div class="screen">
          <iframe id="app" src="/" allow="geolocation; fullscreen"
                  title="Tæppin' demo"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    const wrap = document.getElementById('phoneWrap');
    const frame = document.getElementById('app');
    const PHONE_W = 390, PHONE_H = 844;
    let presenting = false;

    function fit() {
      // opener: roomier margins (phone sits beside the pitch).
      // presenting: tighter margins + bigger cap so the phone fills the stage.
      const margin = presenting ? 20 : 96;
      const cap = presenting ? 2.4 : 1.05;
      const s = Math.min((window.innerHeight - margin) / PHONE_H,
                         (window.innerWidth  - margin) / PHONE_W, cap);
      wrap.style.transform = 'scale(' + s + ')';
      // scale() doesn't change layout size, so the un-scaled 390×844 box leaves a
      // gap (and can clip). Collapse the layout box to the visual size with margins.
      wrap.style.margin = `${-(PHONE_H * (1 - s)) / 2}px ${-(PHONE_W * (1 - s)) / 2}px`;
    }
    window.addEventListener('resize', fit);
    fit();

    function setPresenting(on) {
      if (on === presenting) return;
      presenting = on;
      document.body.classList.toggle('presenting', on);
      fit();
    }

    // play the "tap to pay" gesture on the phone frame (re-triggerable)
    const phone = document.querySelector('.phone');
    const shockLayer = document.getElementById('shockwaves');

    // one expanding hexagonal ring; cleans itself up when the animation ends
    function spawnShock() {
      const el = document.createElement('div');
      el.className = 'shock';
      el.innerHTML = '<svg viewBox="0 0 100 100"><polygon points="50,4 92,28 92,72 50,96 8,72 8,28"/></svg>';
      shockLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
    // a small orange "+" that pops at the tap point and drifts outward
    function spawnPlus() {
      const el = document.createElement('div');
      el.className = 'plus';
      const angle = Math.random() * Math.PI * 2;
      const dist = 70 + Math.random() * 70;
      el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--dy', (Math.sin(angle) * dist - 30) + 'px');
      el.style.fontSize = (16 + Math.random() * 18) + 'px';
      el.textContent = '+';
      shockLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // a quick volley of rings + plus signs for one tap contact
    function shockBurst() {
      spawnShock();
      setTimeout(spawnShock, 110);
      setTimeout(spawnShock, 220);
      const n = 4 + Math.floor(Math.random() * 3);
      for (let i = 0; i < n; i++) setTimeout(spawnPlus, i * 60);
    }

    function playTap() {
      phone.classList.remove('tapping');
      void phone.offsetWidth; // reflow so the animation restarts
      phone.classList.add('tapping');
      // fire shockwaves on each dip of phoneTap (18% and 54% of 1.15s)
      setTimeout(shockBurst, 200);
      setTimeout(shockBurst, 610);
    }

    // The app (iframe) reports onboarding progress; enlarge once we're past the opener.
    let lastStep = 0;
    window.addEventListener('message', e => {
      const d = e.data || {};
      if (d.type === 'taeppin:onb') {
        setPresenting(d.step >= 1);
        // slide 1 is "tap to pay" — let the phone glide to centre, then tap
        if (d.step === 1 && lastStep !== 1) setTimeout(playTap, 380);
        lastStep = d.step;
      } else if (d.type === 'taeppin:stage') setPresenting(true);
    });

    // Left/right arrows drive the pitch (forwarded into the same-origin app).
    window.addEventListener('keydown', e => {
      if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
      const nav = frame.contentWindow && frame.contentWindow.__onbNav;
      if (nav) { e.preventDefault(); nav(e.key === 'ArrowRight' ? 1 : -1); }
    });
  </script>
</body>
</html>
